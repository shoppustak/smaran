openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: panchang
    description: Hindu lunar calendar (Panchang) operations, backed by the Vedika API
  - name: whatsapp
    description: WhatsApp messaging test layer, backed by the Meta WhatsApp Cloud API
  - name: purohits
    description: Purohit onboarding profile lookups, backed by Supabase Postgres
  - name: ingestion
    description: Ingestion job operations
  - name: ledger
    description: Ledger and Payment Corroboration Operations
  - name: metrics
    description: Growth Telemetry and Cohort Metrics
paths:
  /whatsapp/send:
    post:
      operationId: sendWhatsappMessage
      tags: [whatsapp]
      summary: Send a WhatsApp test message
      description: Sends a free-form WhatsApp message via the Meta Cloud API. Only works within an open 24-hour customer service window (i.e. the recipient must have messaged the test number first).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappMessageInput"
      responses:
        "200":
          description: Message accepted by Meta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappSendResult"
        "502":
          description: Upstream Meta API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /whatsapp/messages:
    get:
      operationId: listWhatsappMessages
      tags: [whatsapp]
      summary: List recently received WhatsApp messages
      description: Returns the most recent inbound messages received via the Meta webhook, newest first. In-memory only, for demo/testing purposes.
      responses:
        "200":
          description: Recent inbound messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsappInboundMessage"
  /whatsapp/outbound:
    get:
      operationId: listWhatsappOutboundMessages
      tags: [whatsapp]
      summary: List recently sent WhatsApp outbound messages
      responses:
        "200":
          description: Recent outbound messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsappOutboundMessage"
  /purohits/{phoneNumber}:
    get:
      operationId: getPurohitByPhone
      tags: [purohits]
      summary: Get a purohit's persisted onboarding record by phone number
      parameters:
        - name: phoneNumber
          in: path
          required: true
          schema:
            type: string
        - name: X-Internal-Key
          in: header
          required: true
          description: Shared secret gating this PII-exposing inspection endpoint -- must match INTERNAL_API_KEY
          schema:
            type: string
      responses:
        "200":
          description: Purohit onboarding record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurohitRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Purohit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /ingest-jobs/{id}:
    get:
      operationId: getIngestJob
      tags: [ingestion]
      summary: Get an ingest job status by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Internal-Key
          in: header
          required: true
          description: Shared secret gating this PII-adjacent inspection endpoint -- must match INTERNAL_API_KEY
          schema:
            type: string
      responses:
        "200":
          description: Ingest job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Ingest job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /ingest-jobs/purge:
    post:
      operationId: purgeIngestJobs
      tags: [ingestion]
      summary: Purge sensitive data from old terminal ingest jobs and expire stale ones
      responses:
        "200":
          description: Purge and expiry results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurgeResult"
  /ledger/{id}:
    get:
      operationId: getLedgerEntry
      tags: [ledger]
      summary: Get ledger entry status by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Internal-Key
          in: header
          required: true
          description: Shared secret gating this payment inspection endpoint -- must match INTERNAL_API_KEY
          schema:
            type: string
      responses:
        "200":
          description: Ledger entry status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Ledger entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /metrics/observed-k:
    get:
      operationId: getObservedK
      tags: [metrics]
      summary: Get weekly cohort growth metrics (observed k value)
      description: Returns cohort sizes and growth values grouped by week. Gated by X-Internal-Key.
      parameters:
        - name: X-Internal-Key
          in: header
          required: true
          description: Shared secret gating this growth telemetry endpoint -- must match INTERNAL_API_KEY
          schema:
            type: string
      responses:
        "200":
          description: Weekly cohort metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CohortMetricsList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /panchang:
    get:
      operationId: getPanchang
      tags: [panchang]
      summary: Get today's Panchang
      description: Returns Panchang (Hindu lunar calendar) data for a given date and location, sourced from the Vedika API sandbox.
      parameters:
        - name: date
          in: query
          required: false
          description: Date to resolve, ISO 8601 (defaults to today)
          schema:
            type: string
        - name: latitude
          in: query
          required: false
          schema:
            type: number
        - name: longitude
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Panchang data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Panchang"
        "502":
          description: Upstream Vedika API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /keepalive:
    get:
      operationId: keepalive
      tags: [health]
      summary: Keep-warm endpoint for external uptime pingers
      description: >
        Always returns 200, even when the database is unreachable or not configured —
        external pingers (e.g. cron-job.org) treat non-2xx as failure and auto-disable
        the job after repeated failures. Use /healthz for a strict health check instead.
      responses:
        "200":
          description: Always returned, regardless of database state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeepaliveStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    KeepaliveStatus:
      type: object
      properties:
        status:
          type: string
        database:
          type: string
          enum: [ok, cold, not_configured]
        timestamp:
          type: string
      required:
        - status
        - database
        - timestamp
    Panchang:
      type: object
      description: Simplified Panchang summary derived from the Vedika API
      properties:
        source:
          type: string
          description: Which Vedika environment produced this data
          enum: [sandbox, production]
        date:
          type: string
        tithi:
          type: object
          properties:
            name:
              type: string
            paksha:
              type: string
            number:
              type: integer
          required: [name, paksha, number]
        nakshatra:
          type: object
          properties:
            name:
              type: string
            lord:
              type: string
          required: [name, lord]
        masa:
          type: object
          properties:
            name:
              type: string
            englishEquivalent:
              type: string
          required: [name, englishEquivalent]
        overallAuspiciousness:
          type: string
        summary:
          type: string
        bestActivities:
          type: array
          items:
            type: string
        activitiesToAvoid:
          type: array
          items:
            type: string
        dishaShool:
          type: object
          properties:
            direction:
              type: string
            description:
              type: string
          required: [direction, description]
      required:
        - source
        - date
        - tithi
        - nakshatra
        - masa
        - overallAuspiciousness
        - summary
        - bestActivities
        - activitiesToAvoid
        - dishaShool
    ApiErrorMessage:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    WhatsappMessageInput:
      type: object
      description: Body for sending a free-form WhatsApp text message
      properties:
        to:
          type: string
          description: Recipient phone number in E.164 format (e.g. +919876543210)
        message:
          type: string
      required:
        - to
        - message
    WhatsappSendResult:
      type: object
      properties:
        status:
          type: string
          enum: [sent]
        messageId:
          type: string
      required:
        - status
        - messageId
    WhatsappInboundMessage:
      type: object
      properties:
        from:
          type: string
        text:
          type: string
        receivedAt:
          type: string
      required:
        - from
        - text
        - receivedAt
    WhatsappOutboundMessage:
      type: object
      properties:
        to:
          type: string
        text:
          type: string
        sentAt:
          type: string
      required:
        - to
        - text
        - sentAt
    PurohitRecord:
      type: object
      properties:
        id:
          type: string
        phoneNumber:
          type: string
        name:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        localityKey:
          type: string
        upiId:
          type: string
        calendarSystem:
          type: string
        plan:
          type: string
        createdAt:
          type: string
      required:
        - id
        - phoneNumber
        - name
        - city
        - latitude
        - longitude
        - localityKey
        - upiId
        - calendarSystem
        - plan
        - createdAt
    IngestJobStatus:
      type: object
      properties:
        id:
          type: string
        purohitId:
          type: string
        kind:
          type: string
          enum: [voice, photo]
        status:
          type: string
          enum: [received, transcribed, extracted, awaiting_confirm, confirmed, rejected, failed]
        fieldScores:
          type: object
          additionalProperties:
            type: number
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - purohitId
        - kind
        - status
        - createdAt
        - updatedAt
    PurgeResult:
      type: object
      properties:
        purgedTranscripts:
          type: integer
        purgedExtractions:
          type: integer
        expiredAwaitingConfirm:
          type: integer
        deletedRows:
          type: integer
      required:
        - purgedTranscripts
        - purgedExtractions
        - expiredAwaitingConfirm
        - deletedRows
    LedgerStatus:
      type: object
      properties:
        id:
          type: string
        purohitId:
          type: string
        yajmanId:
          type: string
        eventId:
          type: string
          nullable: true
        amountCollected:
          oneOf:
            - type: string
            - type: number
          nullable: true
        paymentStatus:
          type: string
          enum: [pending, claimed, corroborated]
        purohitClaimedAt:
          type: string
          format: date-time
          nullable: true
        familyConfirmedAt:
          type: string
          format: date-time
          nullable: true
        localityKey:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - purohitId
        - yajmanId
        - paymentStatus
        - localityKey
        - createdAt
    CohortMetricsList:
      type: array
      items:
        $ref: "#/components/schemas/CohortMetrics"
    CohortMetrics:
      type: object
      properties:
        week:
          type: string
        cohortSize:
          type: integer
        referredActivations:
          type: integer
        observedK:
          type: number
      required:
        - week
        - cohortSize
        - referredActivations
        - observedK

